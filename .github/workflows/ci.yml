name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege for the workflow token; the llm-review job widens its own.
permissions:
  contents: read

jobs:
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Test (pytest)
        run: pytest -q

  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Build
        run: npm run build

  # Code Improvement Loop (INC-B12): advisory LLM review via the coder agent.
  # Never blocks a merge; skips cleanly when HF secrets are absent (e.g. forks).
  llm-review:
    name: LLM review (advisory)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need the base branch for the diff

      - name: Check for HF credentials
        id: creds
        env:
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
        run: |
          if [ -n "$HF_API_KEY" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "HF_API_KEY secret not set — skipping LLM review."
          fi

      - name: Set up Python
        if: steps.creds.outputs.present == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        if: steps.creds.outputs.present == 'true'
        run: pip install -e .

      - name: Run review
        if: steps.creds.outputs.present == 'true'
        env:
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          HF_ENDPOINT_URL: ${{ secrets.HF_ENDPOINT_URL }}
        run: |
          git diff "origin/${{ github.base_ref }}...HEAD" | python scripts/llm_review.py --out review.md

      - name: Post sticky PR comment
        if: steps.creds.outputs.present == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('review.md', 'utf8');
            const marker = '## 🤖 SiloLoop code review';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
